<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheese Rolling - Offline</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; }
        .controls { position: absolute; bottom: 20px; left: 20px; color: white; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="ui">
    <h1>CHEESE ROLLING</h1>
    <p>Race the cheese to the bottom!</p>
</div>

<div class="controls">
    <b>A / D</b> : Move | <b>SPACE</b> : Jump/Dive | <b>R</b> : Reset
</div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Constraint, Events } = Matter;

    const engine = Engine.create();
    const render = Render.create({
        element: document.body,
        engine: engine,
        options: {
            width: window.innerWidth,
            height: window.innerHeight,
            wireframes: false,
            background: '#87CEEB'
        }
    });

    // --- GAME OBJECTS ---
    let player, cheese, ground;

    function initGame() {
        Composite.clear(engine.world);
        
        // Long steep hill
        ground = Bodies.rectangle(2500, 1500, 6000, 200, { 
            isStatic: true, 
            angle: 0.25, // About 15 degrees
            render: { fillStyle: '#2d5a27' },
            friction: 0.05
        });

        // The Rolling Cheese
        cheese = Bodies.circle(400, 100, 40, {
            density: 0.01,
            restitution: 0.6,
            friction: 0.01,
            render: { fillStyle: '#FFD700', strokeStyle: '#ccac00', lineWidth: 4 }
        });

        // Simple Ragdoll Player
        const head = Bodies.circle(200, 100, 15, { friction: 0.1, render: { fillStyle: '#ffdbac' } });
        const torso = Bodies.rectangle(200, 140, 30, 50, { friction: 0.1, render: { fillStyle: '#3366ff' } });
        const neck = Constraint.create({ bodyA: head, bodyB: torso, pointB: { x: 0, y: -25 }, stiffness: 0.4 });
        
        player = { torso, head, composite: Composite.create({ bodies: [head, torso], constraints: [neck] }) };

        Composite.add(engine.world, [ground, cheese, player.composite]);
    }

    initGame();

    // --- CONTROLS ---
    const keys = {};
    window.onkeydown = (e) => {
        keys[e.code] = true;
        if(e.code === 'KeyR') initGame(); // Quick reset
    };
    window.onkeyup = (e) => keys[e.code] = false;

    Events.on(engine, 'beforeUpdate', () => {
        // Movement Physics
        if (keys['KeyD']) Matter.Body.applyForce(player.torso, player.torso.position, { x: 0.004, y: 0 });
        if (keys['KeyA']) Matter.Body.applyForce(player.torso, player.torso.position, { x: -0.004, y: 0 });
        if (keys['Space']) Matter.Body.applyForce(player.torso, player.torso.position, { x: 0.005, y: -0.015 });

        // Force the camera to follow the player
        Render.lookAt(render, {
            min: { x: player.torso.position.x - 500, y: player.torso.position.y - 400 },
            max: { x: player.torso.position.x + 500, y: player.torso.position.y + 400 }
        });
    });

    Runner.run(Runner.create(), engine);
    Render.run(render);

    // Handle window resize
    window.addEventListener('resize', () => {
        render.canvas.width = window.innerWidth;
        render.canvas.height = window.innerHeight;
    });
</script>
</body>
</html>
