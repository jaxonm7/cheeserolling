<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheese Rolling - Offline Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui">
    <h1>CHEESE ROLLING</h1>
    <p>A/D to Move | Space to Jump/Dive</p>
    <p>Goal: Beat the cheese to the bottom!</p>
</div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Constraint, MouseConstraint, Mouse, Vector } = Matter;

    // --- SETUP ---
    const engine = Engine.create();
    const render = Render.create({
        element: document.body,
        engine: engine,
        options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#4a7c44' }
    });

    // --- THE HILL ---
    // Creating a long, bumpy terrain
    const ground = Bodies.rectangle(2000, 1000, 5000, 100, { 
        isStatic: true, 
        angle: Math.PI * 0.08,
        render: { fillStyle: '#2d5a27' } 
    });
    
    // --- THE CHEESE ---
    const cheese = Bodies.circle(300, 100, 40, {
        density: 0.005,
        friction: 0.01,
        restitution: 0.8,
        render: { fillStyle: '#FFD700', strokeStyle: '#FFA500', lineWidth: 5 }
    });

    // --- THE RAGDOLL PLAYER ---
    const createRagdoll = (x, y) => {
        const head = Bodies.circle(x, y - 50, 15, { collisionFilter: { group: -1 }, render: { fillStyle: '#ffdbac' } });
        const torso = Bodies.rectangle(x, y, 30, 50, { collisionFilter: { group: -1 }, render: { fillStyle: '#3366ff' } });
        
        // Simple joints
        const neck = Constraint.create({ bodyA: head, bodyB: torso, pointB: { x: 0, y: -25 }, stiffness: 0.6 });
        
        return { composite: Composite.create({ bodies: [head, torso], constraints: [neck] }), main: torso };
    };

    const player = createRagdoll(200, 200);

    // Add everything to the world
    Composite.add(engine.world, [ground, cheese, player.composite]);

    // --- INPUT & CAMERA ---
    const keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    Events.on(engine, 'beforeUpdate', () => {
        // Simple movement
        if (keys['KeyD']) Matter.Body.applyForce(player.main, player.main.position, { x: 0.005, y: 0 });
        if (keys['KeyA']) Matter.Body.applyForce(player.main, player.main.position, { x: -0.005, y: 0 });
        if (keys['Space']) Matter.Body.applyForce(player.main, player.main.position, { x: 0.01, y: -0.02 });

        // Camera Follow (Center on player)
        Render.lookAt(render, {
            min: { x: player.main.position.x - 400, y: player.main.position.y - 300 },
            max: { x: player.main.position.x + 400, y: player.main.position.y + 300 }
        });
    });

    // Run
    Runner.run(Runner.create(), engine);
    Render.run(render);

</script>
</body>
</html>
